<script>
 function viewSceneInfo(dev_id) {
  var info = document.getElementById("scene" + dev_id);
  info.style.display = "block";
  $.ajax({ url: "/ajax/tuya.html?op=info_scene&dev_id=" + dev_id }).done(function(data) {
   document.getElementById("sceneInfo" + dev_id).innerHTML = data;
  });
 }
 function hideSceneInfo(dev_id) {
  document.getElementById("scene" + dev_id).style.display = "none";
 }
</script>

<div class="table-responsive mt-2">
   <table class="table table-striped table-sm align-middle">
      <thead class="table-light">
         <tr>
            <th><#LANG_TITLE#></th>
            <th>ID</th>
            <th>Команда для вызова</th>
            <th class="text-nowrap"></th>
         </tr>
      </thead>
      <tbody>
      [#begin RESULT#]
      <tr>
         <td>[#TITLE#]</td>
         <td>[#DEV_ID#]</td>
         <td><code>TuyaScene('[#DEV_ID#]');</code></td>
         <td>
            <div class="d-flex gap-1">
               <button type="button" onClick="$.ajax({url: '/ajax/tuya.html?op=run_scene&dev_id=[#DEV_ID#]'});" class="btn btn-outline-primary btn-sm" title="Запустить сцену"><i class="bi bi-lightning-fill"></i></button>
               <button type="button" onClick="viewSceneInfo('[#DEV_ID#]');" class="btn btn-outline-secondary btn-sm" title="Показать код сцены"><i class="bi bi-eye"></i></button>
               <a href="?id=[#ID#]&view_mode=delete_tudevices&tab=scene" onClick="return confirm('<#LANG_ARE_YOU_SURE#>');" class="btn btn-outline-danger btn-sm" title="Удалить"><i class="bi bi-trash"></i></a>
            </div>
         </td>
      </tr>
      <tr id="scene[#DEV_ID#]" onClick="hideSceneInfo('[#DEV_ID#]');" style="display:none">
         <td id="sceneInfo[#DEV_ID#]" colspan="4"></td>
      </tr>
      [#end RESULT#]
      </tbody>
   </table>
</div>

<input type="hidden" name="view_mode" value="<#VIEW_MODE#>">
<input type="hidden" name="edit_mode" value="<#EDIT_MODE#>">
<input type="hidden" name="mode" value="update">
<input type="hidden" name="data_source" value="<#DATA_SOURCE#>">
<input type="hidden" name="tab" value="<#TAB#>">
